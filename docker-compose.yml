services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Strong!Passw0rd123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Strong!Passw0rd123' -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: ./backend
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ConnectionStrings__Default=Server=sqlserver,1433;Database=akster;User Id=sa;Password=Strong!Passw0rd123;TrustServerCertificate=True;

  frontend:
    build: ./frontend/frontend
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  sql_data: