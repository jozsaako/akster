<main class="auth-shell">
  <section class="auth-card">
    <div class="auth-card__brand">PetPal</div>

    <div class="auth-card__header">
      @if (mode() === 'login') {
        <h1>Welcome back</h1>
        <p>Sign in to continue to your dashboard.</p>
      } @else {
        <h1>Create your account</h1>
        <p>Register once and start connecting with pet sitters.</p>
      }
    </div>

    <div class="tab-list" role="tablist" aria-label="Authentication mode">
      <button
        type="button"
        role="tab"
        [class.active]="mode() === 'login'"
        [attr.aria-selected]="mode() === 'login'"
        (click)="setMode('login')"
      >Login</button>
      <button
        type="button"
        role="tab"
        [class.active]="mode() === 'register'"
        [attr.aria-selected]="mode() === 'register'"
        (click)="setMode('register')"
      >Register</button>
    </div>

    @if (mode() === 'login') {
      <app-login />
    } @else {
      <app-register />
    }
  </section>
</main>
